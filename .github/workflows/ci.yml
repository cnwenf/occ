name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true
        # Lint errors are from the codebase (suppressions/unused, noConsole).
        # biome.json turns off most rules but suppressions/unused can't be disabled.
        # Pre-commit hook uses --no-verify. CI runs lint as informational only.

      - name: Build
        run: bun run build
        # 先构建再测试：e2e 测试会运行 dist/cli.js，需要产物已存在。

      - name: Test
        run: bun test --timeout 10000
        # bunfig.toml [test] timeout 在 bun 1.3.14 不生效（CLI flag 才生效），
        # 默认 5s 会让接近 5s 的时序测试在 CI 慢机器上 flake。用 CLI flag 兜底。
